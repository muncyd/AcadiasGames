<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acadia's Zoo Soccer! ⚽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a6b2e 0%, #2d8a45 50%, #1a6b2e 100%);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    font-family: 'Nunito', sans-serif; overflow: hidden;
  }
  #gameTitle {
    font-family: 'Fredoka One', cursive; color: #FFE44D; font-size: 2.2rem;
    text-shadow: 3px 3px 0px #B8860B, 0 0 20px rgba(255,228,77,0.4);
    margin-bottom: 8px; letter-spacing: 1px;
    animation: titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce {
    0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); }
  }
  #gameContainer {
    position: relative; border: 4px solid #FFE44D; border-radius: 16px;
    overflow: hidden; box-shadow: 0 0 40px rgba(255,228,77,0.3), 0 10px 40px rgba(0,0,0,0.5);
  }
  canvas { display: block; cursor: crosshair; }
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.7); padding: 8px 20px;
    border-top: 2px solid #FFE44D; color: white; font-family: 'Fredoka One', cursive;
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; }
  .hud-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .hud-value { font-size: 1.6rem; color: #FFE44D; text-shadow: 0 0 10px rgba(255,228,77,0.5); line-height: 1; }
  #timerBar { width: 160px; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; overflow: hidden; margin-top: 2px; border: 1px solid rgba(255,255,255,0.3); }
  #timerFill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); border-radius: 6px; transition: width 0.1s linear, background 0.5s; }
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); z-index: 10; backdrop-filter: blur(3px);
  }
  #overlay h2 { font-family: 'Fredoka One', cursive; color: #FFE44D; font-size: 2.5rem; text-shadow: 3px 3px 0px #B8860B; margin-bottom: 10px; }
  #overlay p { color: white; font-size: 1.1rem; margin-bottom: 6px; text-align: center; }
  #overlay .final-score { font-family: 'Fredoka One', cursive; font-size: 3rem; color: #4CAF50; text-shadow: 0 0 20px rgba(76,175,80,0.5); margin: 10px 0; }
  #startBtn {
    margin-top: 20px; padding: 14px 40px;
    background: linear-gradient(135deg, #FFE44D, #FFA500); color: #1a1a1a;
    border: none; border-radius: 50px; font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; cursor: pointer; box-shadow: 0 6px 20px rgba(255,165,0,0.4);
    transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 1px;
  }
  #startBtn:hover { transform: scale(1.07) translateY(-2px); box-shadow: 0 10px 28px rgba(255,165,0,0.6); }
  #startBtn:active { transform: scale(0.97); }
  .goal-flash {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,230,0,0.55); pointer-events: none; z-index: 5;
    animation: flashOut 0.8s forwards;
  }
  @keyframes flashOut {
    0%   { opacity:1; }
    30%  { opacity:0.8; }
    100% { opacity:0; }
  }
  #instructions { color: rgba(255,255,255,0.75); font-size: 0.85rem; margin-top: 6px; text-align: center; }
</style>
</head>
<body>

<div id="gameTitle">&#x26BD; Acadia's Zoo Soccer! &#x26BD;</div>
<div id="gameContainer">
  <canvas id="gameCanvas" width="700" height="460"></canvas>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Goals</span><span class="hud-value" id="scoreDisplay">0</span></div>
    <div class="hud-item">
      <span class="hud-label">Time Left</span>
      <span class="hud-value" id="timerDisplay">1:00</span>
      <div id="timerBar"><div id="timerFill" style="width:100%"></div></div>
    </div>
    <div class="hud-item"><span class="hud-label">Best</span><span class="hud-value" id="bestDisplay">0</span></div>
  </div>
  <div id="overlay">
    <h2 id="overlayTitle">&#x1F981; Zoo Soccer! &#x1F981;</h2>
    <p id="overlayMsg">Move mouse to aim, click to shoot!</p>
    <p>Beat the Naked Mole Rat goalie! &#x1F400;</p>
    <div id="finalScore" class="final-score" style="display:none"></div>
    <button id="startBtn">KICK OFF! &#x26BD;</button>
    <div id="instructions">The ball comes back — keep shooting!</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Goal: bigger, positioned mid-field (closer to Acadia)
const GOAL_W = 230;
const GOAL_H = 80;
const GOAL_CY = Math.round(H * 0.50);
const goalLeft   = W/2 - GOAL_W/2;
const goalRight  = W/2 + GOAL_W/2;
const goalTop    = GOAL_CY - GOAL_H;
const goalBottom = GOAL_CY;
const GOALIE_Y   = goalBottom;   // goalie stands at the goal line (ground)
const PLAYER_Y   = H - 85;

let score=0, bestScore=0, timeLeft=60, gameActive=false;
let timerInterval=null;
let ball=null, canShoot=true, celebrationTimer=0;
let particles=[];
let mouseX=W/2, aimX=W/2, aimY=H/2;
let goalieX=W/2;
// Goalie moves on smooth sinusoidal pattern with random speed/amplitude changes
let goaliePhase=0;
let goalieFreq=0.04;      // how fast it oscillates
let goalieAmp=90;         // how wide it swings (half of goal width)
let goalieCenterX=W/2;    // center of oscillation drifts slowly too
let goalieFreqTimer=0;    // countdown to next frequency/amplitude change

const GOAL_TEXTS=['GOAL!','NICE SHOT!','AMAZING!','GOOOAL!','SUPERSTAR!'];

// Single active message — only one at a time, no overlap
let activeMsg=null;

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
      life:1,decay:0.018+Math.random()*0.02,r:3+Math.random()*6,color});
  }
}
function showMsg(text, isGoal){
  activeMsg={text, x:W/2, y:H/2-20, life:1.0, vy:-0.8, scale:0, isGoal:!!isGoal};
}

// ── Ball class ──────────────────────────────────────────────────────────────
function resetCanShoot(){
  canShoot = true;
  if(ball){ ball.settled=true; ball.vx=0; ball.vy=0; ball.x=mouseX+13; ball.y=PLAYER_Y+38; }
}

class Ball {
  constructor(sx,sy,tx,ty){
    this.x=sx; this.y=sy; this.r=13;
    this.rot=0; this.trail=[];
    this.goalHandled=false;
    this.settled=false;
    this.inNet=false;       // ball is sitting inside the net after a goal
    this.netTimer=0;        // counts down frames before teleporting back
    this.arc=0; this.arcV=-0.45;
    const d=Math.hypot(tx-sx,ty-sy), spd=12+Math.random()*3;
    this.vx=(tx-sx)/d*spd; this.vy=(ty-sy)/d*spd;
    this._safetyTimer = setTimeout(resetCanShoot, 4000);
  }

  settle(){
    if(this.settled) return;
    clearTimeout(this._safetyTimer);
    this.settled=true;
    this.vx=0; this.vy=0;
    this.x=mouseX+13; this.y=PLAYER_Y+38;
    canShoot=true;
    activeMsg=null;  // clear any lingering message
  }

  update(){
    if(this.settled) return;

    // ── Ball is in net — count down then snap back to feet ──
    if(this.inNet){
      this.netTimer--;
      this.rot+=0.08;
      if(this.netTimer<=0){
        this.inNet=false;
        this.settle();
      }
      return;
    }

    // trail
    this.trail.push({x:this.x,y:this.y,life:1});
    if(this.trail.length>10) this.trail.shift();
    this.trail.forEach(t=>t.life-=0.12);

    // move + gravity
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.3;
    this.arc+=this.arcV; this.arcV+=0.04;
    this.rot+=0.13;

    // ── goal zone check ──
    if(!this.goalHandled &&
       this.x>goalLeft && this.x<goalRight &&
       this.y>goalTop  && this.y<goalBottom){

      this.goalHandled=true;
      // Goalie hitbox: 50px — matches the larger goalie body width
      const bd=Math.hypot(this.x-goalieX, this.y-GOALIE_Y);

      if(bd<50){
        // SAVED
        this.vx=(this.x>goalieX?1:-1)*5 + (Math.random()-0.5)*3;
        this.vy=6;
        this.arc=0; this.arcV=0;
        spawnParticles(this.x,this.y,'#ff5555',14);
        showMsg('SAVED! \uD83D\uDC00', false);
      } else {
        // GOAL — freeze ball in net, celebrate
        this.vx=0; this.vy=0; this.arc=0; this.arcV=0;
        // Let ball drift just slightly into net center
        this.x=Math.max(goalLeft+20, Math.min(goalRight-20, this.x));
        this.y=Math.min(goalBottom-10, Math.max(goalTop+15, this.y));
        this.inNet=true;
        this.netTimer=90; // ~1.5 seconds at 60fps

        score++;
        if(score>bestScore) bestScore=score;
        document.getElementById('scoreDisplay').textContent=score;
        document.getElementById('bestDisplay').textContent=bestScore;
        celebrationTimer=80;

        // Big confetti burst
        for(let i=0;i<5;i++) setTimeout(()=>{
          spawnParticles(W/2+(Math.random()-0.5)*200, H/2+(Math.random()-0.5)*100,'#FFE44D',12);
          spawnParticles(W/2+(Math.random()-0.5)*200, H/2+(Math.random()-0.5)*100,'#4CAF50',10);
          spawnParticles(W/2+(Math.random()-0.5)*200, H/2+(Math.random()-0.5)*100,'#FF6B1A',8);
        }, i*120);

        showMsg(GOAL_TEXTS[Math.floor(Math.random()*GOAL_TEXTS.length)]+' \u26BD', true);

        // Big screen flash
        const fl=document.createElement('div'); fl.className='goal-flash';
        document.getElementById('gameContainer').appendChild(fl);
        setTimeout(()=>fl.remove(),600);
      }
    }

    // re-arm once ball exits goal zone
    if(this.goalHandled &&
       (this.x<goalLeft-5||this.x>goalRight+5||this.y>goalBottom+5||this.y<goalTop-5)){
      this.goalHandled=false;
    }

    // wall bounces
    if(this.x<this.r)   { this.x=this.r;   this.vx= Math.abs(this.vx)*0.7; }
    if(this.x>W-this.r) { this.x=W-this.r; this.vx=-Math.abs(this.vx)*0.7; }
    if(this.y<this.r)   { this.y=this.r;   this.vy= Math.abs(this.vy)*0.6; }

    // floor bounce + friction
    if(this.y>=H-this.r){
      this.y=H-this.r;
      this.vy=-Math.abs(this.vy)*0.45;
      this.vx*=0.85;
      this.arc=0; this.arcV=0;
      if(Math.abs(this.vy)<2) this.vy=0;
    }

    // settle when stopped on floor
    if(this.vy===0 && Math.abs(this.vx)<0.5 && this.y>=H-this.r-1){
      this.settle();
    }
  }

  draw(){
    if(this.settled && !this.inNet) {
      // draw ball at feet (settled position already set)
    }
    const scale=Math.max(0.5,1+this.arc*0.05);
    this.trail.forEach(t=>{
      if(t.life>0){
        ctx.save(); ctx.globalAlpha=t.life*0.26;
        ctx.fillStyle='#fff'; ctx.beginPath();
        ctx.arc(t.x,t.y,this.r*0.45*t.life,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
    });
    ctx.save();
    ctx.translate(this.x,this.y); ctx.scale(scale,scale); ctx.rotate(this.rot);
    ctx.save(); ctx.globalAlpha=0.22; ctx.scale(1,0.28);
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(0,this.r*4,this.r*0.9,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(0,0,this.r*0.3,0,Math.PI*2); ctx.fill();
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2+this.rot*0.25;
      ctx.beginPath(); ctx.arc(Math.cos(a)*this.r*0.63,Math.sin(a)*this.r*0.63,this.r*0.2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── Background ──────────────────────────────────────────────────────────────
function drawBackground(){
  const sg=ctx.createLinearGradient(0,0,0,H*0.42);
  sg.addColorStop(0,'#6EC6F0'); sg.addColorStop(1,'#B8E4F9');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H*0.42);

  const ct=Date.now()*0.0002;
  drawCloud(90+Math.sin(ct)*20,38,58);
  drawCloud(390+Math.sin(ct*0.7+1)*14,28,44);
  drawCloud(590+Math.sin(ct*0.5+2)*22,52,52);

  // fence
  ctx.strokeStyle='#8B5E3C'; ctx.lineWidth=3;
  for(let i=0;i<W;i+=30){
    ctx.beginPath(); ctx.moveTo(i,H*0.34); ctx.lineTo(i,H*0.42-8); ctx.stroke();
    ctx.fillStyle='#A0714F'; ctx.beginPath(); ctx.arc(i,H*0.34,5,0,Math.PI*2); ctx.fill();
  }
  ctx.beginPath(); ctx.moveTo(0,H*0.37); ctx.lineTo(W,H*0.37); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,H*0.41); ctx.lineTo(W,H*0.41); ctx.stroke();

  drawTree(55,H*0.42,33,68); drawTree(625,H*0.42,29,58);
  drawTree(165,H*0.42,24,48); drawTree(535,H*0.42,27,54);

  ctx.save();
  ctx.fillStyle='#5D3A1A'; ctx.fillRect(W/2-62,4,124,26);
  ctx.strokeStyle='#FFE44D'; ctx.lineWidth=2; ctx.strokeRect(W/2-62,4,124,26);
  ctx.fillStyle='#FFE44D'; ctx.font='bold 13px "Fredoka One",cursive';
  ctx.textAlign='center'; ctx.fillText('\uD83E\uDD81 CITY ZOO \u26BD',W/2,21);
  ctx.restore();

  const fg=ctx.createLinearGradient(0,H*0.42,0,H);
  fg.addColorStop(0,'#3a9b3f'); fg.addColorStop(0.5,'#2d8a33'); fg.addColorStop(1,'#236b28');
  ctx.fillStyle=fg; ctx.fillRect(0,H*0.42,W,H);
  for(let i=0;i<7;i++){
    ctx.fillStyle=i%2===0?'rgba(0,0,0,0.05)':'rgba(255,255,255,0.04)';
    ctx.fillRect(i*(W/7),H*0.42,W/7,H);
  }

  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(W/2,H*0.8,55,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2,H*0.42); ctx.lineTo(W/2,H); ctx.stroke();
  // penalty arc near goal
  ctx.strokeStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.arc(W/2,goalBottom+8,60,Math.PI*0.08,Math.PI*0.92); ctx.stroke();
}

function drawCloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.arc(x,y,s*0.5,0,Math.PI*2); ctx.arc(x+s*0.4,y+4,s*0.4,0,Math.PI*2);
  ctx.arc(x-s*0.4,y+4,s*0.35,0,Math.PI*2); ctx.arc(x+s*0.1,y+9,s*0.45,0,Math.PI*2);
  ctx.fill();
}
function drawTree(x,y,w,h){
  ctx.fillStyle='#8B5E3C'; ctx.fillRect(x-5,y,10,18);
  [['#2e7d32',1,0],['#388e3c',0.75,0.1],['#43a047',0.5,0.22]].forEach(([c,f,oy])=>{
    ctx.fillStyle=c; ctx.beginPath();
    ctx.moveTo(x,y-h*f); ctx.lineTo(x-w*(1-oy*2),y+h*oy); ctx.lineTo(x+w*(1-oy*2),y+h*oy);
    ctx.closePath(); ctx.fill();
  });
}

// ── Goal ────────────────────────────────────────────────────────────────────
function drawGoal(){
  const pw=8;
  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.fillRect(goalLeft-4,goalTop+5,GOAL_W+8,GOAL_H);

  ctx.strokeStyle='rgba(255,255,255,0.32)'; ctx.lineWidth=1;
  for(let gx=goalLeft;gx<=goalRight;gx+=22){
    ctx.beginPath(); ctx.moveTo(gx,goalTop); ctx.lineTo(gx,goalBottom); ctx.stroke();
  }
  for(let gy=goalTop;gy<=goalBottom;gy+=13){
    ctx.beginPath(); ctx.moveTo(goalLeft,gy); ctx.lineTo(goalRight,gy); ctx.stroke();
  }
  ctx.fillStyle='#f8f8f8';
  ctx.fillRect(goalLeft-pw/2,goalTop,pw,GOAL_H);
  ctx.fillRect(goalRight-pw/2,goalTop,pw,GOAL_H);
  ctx.fillRect(goalLeft-pw/2,goalTop,GOAL_W+pw,pw);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1;
  ctx.strokeRect(goalLeft-pw/2,goalTop,pw,GOAL_H);
  ctx.strokeRect(goalRight-pw/2,goalTop,pw,GOAL_H);
  ctx.strokeRect(goalLeft-pw/2,goalTop,GOAL_W+pw,pw);
}

// ── Goalie (naked mole rat) ──────────────────────────────────────────────────
function drawGoalie(){
  const x=goalieX, y=GOALIE_Y, t=Date.now()*0.003;
  const ls=Math.sin(t*3)*7;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(1.4, 1.4);   // bigger goalie — feet stay at GOALIE_Y (goalBottom)

  ctx.fillStyle='rgba(0,0,0,0.16)'; ctx.beginPath();
  ctx.ellipse(0,26,18,5,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#222';
  ctx.fillRect(-9,17,7,10+ls); ctx.fillRect(2,17,7,10-ls);
  ctx.fillStyle='#FF6B1A';
  ctx.fillRect(-10,26+ls,9,4); ctx.fillRect(1,26-ls,9,4);

  ctx.fillStyle='#FF6B1A'; ctx.beginPath();
  ctx.rect(-12,-4,24,22); ctx.fill();
  ctx.strokeStyle='#CC4400'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='white'; ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
  ctx.fillText('1',0,8);

  const aw=Math.sin(t*2)*28;
  ctx.strokeStyle='#F4A57A'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-24-aw*0.5,-6+aw*0.3); ctx.stroke();
  ctx.fillStyle='#FF6B1A'; ctx.beginPath(); ctx.arc(-24-aw*0.5,-6+aw*0.3,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(24+aw*0.5,-6-aw*0.3); ctx.stroke();
  ctx.fillStyle='#FF6B1A'; ctx.beginPath(); ctx.arc(24+aw*0.5,-6-aw*0.3,7,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#F4C89A'; ctx.beginPath(); ctx.ellipse(0,-16,15,14,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#D4966A'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.strokeStyle='rgba(150,80,30,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(-4,-20,5,0.5,2.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(5,-18,4,0.8,2.8); ctx.stroke();

  ctx.fillStyle='#ff9999';
  ctx.beginPath(); ctx.arc(-6,-18,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-18,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc0000';
  ctx.beginPath(); ctx.arc(-6,-18,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-18,1.5,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#FFFACD'; ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.fillRect(-6,-10,5,7); ctx.strokeRect(-6,-10,5,7);
  ctx.fillRect(0,-10,5,7);  ctx.strokeRect(0,-10,5,7);

  ctx.fillStyle='#ff8fa0'; ctx.beginPath(); ctx.ellipse(0,-12,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc5566';
  ctx.beginPath(); ctx.arc(-2,-12,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-12,1.3,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#F4C89A';
  ctx.beginPath(); ctx.arc(-13,-22,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,-22,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffb3c0';
  ctx.beginPath(); ctx.arc(-13,-22,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,-22,3,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#FF6B1A'; ctx.beginPath(); ctx.arc(0,-28,13,Math.PI,0); ctx.fill();
  ctx.fillStyle='#CC4400'; ctx.fillRect(-13,-28,26,4);
  ctx.fillStyle='#FF6B1A'; ctx.fillRect(-17,-28,34,3);

  ctx.strokeStyle='rgba(100,60,20,0.5)'; ctx.lineWidth=0.8;
  for(let sd of [-1,1]) for(let wi=0;wi<3;wi++){
    ctx.beginPath(); ctx.moveTo(sd*4,-11+wi*2); ctx.lineTo(sd*(15+wi*2),-14+wi*3); ctx.stroke();
  }
  ctx.restore();
}

// ── Player (Acadia – kid proportions) ───────────────────────────────────────
function drawPlayer(){
  const x=mouseX, y=PLAYER_Y, t=Date.now()*0.003;
  const kicking=!canShoot;
  const sw=Math.sin(t*3)*10;

  ctx.save(); ctx.translate(x,y);

  // ground shadow
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath();
  ctx.ellipse(0,60,22,6,0,0,Math.PI*2); ctx.fill();

  // ── hair (behind head) ──
  ctx.fillStyle='#c84b14';
  ctx.beginPath(); ctx.ellipse(0,-30,25,23,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-21,-27,11,10,0.35,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(21,-27,11,10,-0.35,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-15,-44,11,11,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15,-44,11,11,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-50,13,12,0,0,Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle='rgba(225,88,25,0.5)';
  ctx.beginPath(); ctx.ellipse(-6,-46,7,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,160,80,0.28)';
  ctx.beginPath(); ctx.ellipse(9,-40,5,4,0.5,0,Math.PI*2); ctx.fill();

  // ── face ──
  ctx.fillStyle='#f6cfa8';
  ctx.beginPath(); ctx.ellipse(0,-28,20,21,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#e0a070'; ctx.lineWidth=0.8; ctx.stroke();

  // chubby cheeks
  ctx.fillStyle='rgba(255,155,115,0.3)';
  ctx.beginPath(); ctx.ellipse(-16,-27,10,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(16,-27,10,8,0,0,Math.PI*2); ctx.fill();

  // eyebrows
  ctx.strokeStyle='#b04010'; ctx.lineWidth=2.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-13,-39); ctx.quadraticCurveTo(-8,-41,-3,-39); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,-39); ctx.quadraticCurveTo(8,-41,13,-39); ctx.stroke();

  // eyes – big and round (kid feature)
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.ellipse(-8,-32,7,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-32,7,6,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.ellipse(-8,-32,7,6,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(8,-32,7,6,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='#4a8c30';
  ctx.beginPath(); ctx.arc(-8,-32,4.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-32,4.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-8,-32,2.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-32,2.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-6.5,-33.5,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9.5,-33.5,1.2,0,Math.PI*2); ctx.fill();

  // neck
  ctx.fillStyle='#f6cfa8'; ctx.fillRect(-6,-8,12,10);

  // button nose
  ctx.fillStyle='#e09070'; ctx.beginPath(); ctx.ellipse(0,-22,4.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c06050';
  ctx.beginPath(); ctx.arc(-2,-22,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-22,1.3,0,Math.PI*2); ctx.fill();

  // big gappy smile
  ctx.strokeStyle='#b06040'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,-16,9,0.12,Math.PI-0.12); ctx.stroke();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(0,-11,6,Math.PI,0); ctx.fill();
  ctx.fillStyle='#e09070'; ctx.fillRect(-1,-11,2,5.5); // tooth gap

  // freckles
  ctx.fillStyle='rgba(170,80,40,0.4)';
  [[-13,-25],[-15,-22],[-11,-21],[11,-25],[13,-22],[15,-21],[-4,-21],[4,-21],[0,-20]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx,fy,1.6,0,Math.PI*2); ctx.fill();
  });

  // ── body – white shirt ──
  ctx.fillStyle='#f2f2f2';
  ctx.beginPath(); ctx.rect(-15,-8,30,28); ctx.fill();
  ctx.strokeStyle='#d0d0d0'; ctx.lineWidth=1; ctx.stroke();
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-7,-8); ctx.lineTo(0,-1); ctx.lineTo(7,-8); ctx.stroke();
  ctx.fillStyle='#d0d0d0';
  [2,9,16].forEach(by=>{ ctx.beginPath(); ctx.arc(0,-8+by,1.5,0,Math.PI*2); ctx.fill(); });

  // ── skirt – plaid ──
  ctx.fillStyle='#354e38';
  ctx.beginPath();
  ctx.moveTo(-20,20); ctx.lineTo(-25,52); ctx.lineTo(25,52); ctx.lineTo(20,20);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(120,40,40,0.42)'; ctx.lineWidth=2;
  for(let i=-16;i<24;i+=8){
    ctx.beginPath(); ctx.moveTo(i-4,20); ctx.lineTo(i-8,52); ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5;
  for(let j=26;j<52;j+=9){
    ctx.beginPath(); ctx.moveTo(-25,j); ctx.lineTo(25,j); ctx.stroke();
  }

  // ── arms ──
  ctx.strokeStyle='#f6cfa8'; ctx.lineWidth=8; ctx.lineCap='round';
  if(kicking){
    ctx.beginPath(); ctx.moveTo(-13,2); ctx.lineTo(-28,16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13,2);  ctx.lineTo(30,-10); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-13,2); ctx.lineTo(-24,20+sw*0.35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13,2);  ctx.lineTo(24,20-sw*0.35);  ctx.stroke();
  }

  // ── legs ──
  ctx.strokeStyle='#f6cfa8'; ctx.lineWidth=9; ctx.lineCap='round';
  if(kicking){
    ctx.beginPath(); ctx.moveTo(-9,52); ctx.lineTo(-14,70); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,52);  ctx.lineTo(26,40);  ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-9,52); ctx.lineTo(-13+sw*0.3,70); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9,52);  ctx.lineTo(13-sw*0.3,70);  ctx.stroke();
  }

  // ── shoes ──
  ctx.fillStyle='#4466EE';
  if(kicking){
    ctx.beginPath(); ctx.ellipse(-14,72,11,5.5,0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(29,42,11,5.5,-0.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF6B35';
    ctx.fillRect(-24,69,10,3.5); ctx.fillRect(21,40,10,3.5);
  } else {
    ctx.beginPath(); ctx.ellipse(-13+sw*0.3,72,11,5.5,0.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(13-sw*0.3,72,11,5.5,-0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF6B35';
    ctx.fillRect(-23+sw*0.3,69,10,3.5); ctx.fillRect(4-sw*0.3,69,10,3.5);
  }

  ctx.restore();
}

function drawAimLine(){
  if(!canShoot || !gameActive) return;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.38)'; ctx.lineWidth=1.5;
  ctx.setLineDash([6,8]);
  ctx.beginPath(); ctx.moveTo(mouseX,PLAYER_Y+38); ctx.lineTo(aimX,aimY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,100,0.7)';
  ctx.beginPath(); ctx.arc(aimX,aimY,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life-=p.decay;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawActiveMsg(){
  // Never show messages when no ball is active or ball is already settled at feet
  if(!activeMsg) return;
  if(!ball || (ball.settled && !ball.inNet)) return;

  activeMsg.y+=activeMsg.vy;
  activeMsg.life-=0.012;
  activeMsg.scale=Math.min(1,activeMsg.scale+0.12);
  if(activeMsg.life<=0){ activeMsg=null; return; }

  ctx.save();
  ctx.globalAlpha=Math.min(1,activeMsg.life*2); // quick fade-in, slow fade-out
  ctx.translate(activeMsg.x, activeMsg.y);
  ctx.scale(activeMsg.scale, activeMsg.scale);

  if(activeMsg.isGoal){
    // BIG gold goal message
    ctx.font='bold 62px "Fredoka One",cursive';
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=9;
    ctx.strokeText(activeMsg.text,0,0);
    ctx.fillStyle='#FFE44D';
    ctx.fillText(activeMsg.text,0,0);
    // rainbow glow
    ctx.globalAlpha*=0.25;
    ctx.fillStyle='#FF6B1A';
    ctx.fillText(activeMsg.text,3,3);
  } else {
    // smaller red save message
    ctx.font='bold 38px "Fredoka One",cursive';
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=6;
    ctx.strokeText(activeMsg.text,0,0);
    ctx.fillStyle='#FF4444';
    ctx.fillText(activeMsg.text,0,0);
  }
  ctx.restore();
}

function updateGoalie(){
  if(!gameActive) return;

  // Advance phase each frame for smooth continuous motion
  goaliePhase += goalieFreq;

  // Periodically randomize frequency, amplitude and center to keep it unpredictable
  goalieFreqTimer--;
  if(goalieFreqTimer <= 0){
    goalieFreq    = 0.045 + Math.random() * 0.055;  // oscillation speed
    goalieAmp     = 60   + Math.random() * 45;       // swing width
    goalieCenterX = W/2  + (Math.random()-0.5) * 60; // drift center left/right
    goalieFreqTimer = 40 + Math.floor(Math.random() * 50); // change every 40-90 frames
  }

  goalieX = goalieCenterX + Math.sin(goaliePhase) * goalieAmp;
  goalieX = Math.max(goalLeft+22, Math.min(goalRight-22, goalieX));
}

function shoot(tx,ty){
  if(!canShoot || !gameActive) return;
  canShoot=false;
  ball=new Ball(mouseX,PLAYER_Y+38,tx,ty);
}

function gameLoop(){
  try {
    ctx.clearRect(0,0,W,H);
    drawBackground(); drawGoal();
    updateGoalie(); drawGoalie();
    drawAimLine();
    if(ball){ ball.update(); ball.draw(); }
    drawPlayer();
    drawParticles(); drawActiveMsg();
    if(celebrationTimer>0) celebrationTimer--;
  } catch(e) {
    console.error('Game loop error:', e);
  }
  requestAnimationFrame(gameLoop);
}

function startTimer(){
  timeLeft=60;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    const s=timeLeft%60;
    document.getElementById('timerDisplay').textContent=`${Math.floor(timeLeft/60)}:${s.toString().padStart(2,'0')}`;
    const pct=(timeLeft/60)*100;
    const fill=document.getElementById('timerFill');
    fill.style.width=pct+'%';
    if(pct<30)      fill.style.background='linear-gradient(90deg,#f44336,#ff6b6b)';
    else if(pct<60) fill.style.background='linear-gradient(90deg,#FFA500,#FFD700)';
    else            fill.style.background='linear-gradient(90deg,#4CAF50,#8BC34A)';
    if(timeLeft<=0){ clearInterval(timerInterval); endGame(); }
  },1000);
}

function startGame(){
  score=0; timeLeft=60;
  if(ball && ball._safetyTimer) clearTimeout(ball._safetyTimer);
  ball=null; canShoot=true;
  particles=[]; activeMsg=null; gameActive=true; celebrationTimer=0;
  goalieX=W/2; goaliePhase=Math.random()*Math.PI*2; goalieFreq=0.05; goalieAmp=85; goalieCenterX=W/2; goalieFreqTimer=60;
  document.getElementById('scoreDisplay').textContent='0';
  document.getElementById('timerDisplay').textContent='1:00';
  document.getElementById('timerFill').style.width='100%';
  document.getElementById('timerFill').style.background='linear-gradient(90deg,#4CAF50,#8BC34A)';
  document.getElementById('overlay').style.display='none';
  startTimer();
}

function endGame(){
  gameActive=false; ball=null; canShoot=false;
  if(score>bestScore) bestScore=score;
  document.getElementById('bestDisplay').textContent=bestScore;
  let title,msg;
  if(score===0){      title='Keep Trying! \uD83D\uDCAA'; msg='That mole rat was sneaky! Try again!'; }
  else if(score<3){   title='Nice Try! \u26BD';      msg="You're warming up — keep going!"; }
  else if(score<6){   title='Great Job! \uD83C\uDF1F'; msg="The mole rat couldn't stop all your shots!"; }
  else if(score<10){  title='AMAZING! \uD83C\uDFC6'; msg="You're a total soccer superstar!"; }
  else {              title='LEGENDARY! \uD83E\uDD81\u26BD\uD83D\uDC51'; msg='The whole zoo is going wild for you!'; }
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlayMsg').textContent=msg;
  const fs=document.getElementById('finalScore');
  fs.textContent=`\u26BD ${score} Goal${score!==1?'s':''}!`;
  fs.style.display='block';
  document.getElementById('startBtn').textContent='PLAY AGAIN! \u26BD';
  document.getElementById('instructions').textContent=score>0?`Best: ${bestScore} goals`:'Move mouse to aim, click to shoot!';
  document.getElementById('overlay').style.display='flex';
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=Math.max(30,Math.min(W-30,e.clientX-r.left));
  aimX=e.clientX-r.left; aimY=e.clientY-r.top;
  if(ball && ball.settled){ ball.x=mouseX+13; ball.y=PLAYER_Y+38; }
});
canvas.addEventListener('click',e=>{
  if(!gameActive) return;
  const r=canvas.getBoundingClientRect();
  shoot(e.clientX-r.left, e.clientY-r.top);
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  mouseX=Math.max(30,Math.min(W-30,t.clientX-r.left));
  aimX=t.clientX-r.left; aimY=t.clientY-r.top;
  if(ball && ball.settled){ ball.x=mouseX+13; ball.y=PLAYER_Y+38; }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!gameActive) return;
  const r=canvas.getBoundingClientRect(), t=e.changedTouches[0];
  shoot(t.clientX-r.left, t.clientY-r.top);
},{passive:false});

document.getElementById('startBtn').addEventListener('click',startGame);
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
